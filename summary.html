<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אזימוט - סיכום קורס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f8fa;--white:#fff;--ink:#1c2230;--muted:#6b7280;--border:#e2e5ea;--accent:#3b82f6;--accent-soft:#eff6ff;--accent-dark:#1d4ed8;--danger:#ef4444;--radius:14px;--radius-sm:8px;--shadow:0 2px 16px rgba(0,0,0,0.07);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--ink);padding:24px 16px 64px;}
.wrap{max-width:960px;margin:0 auto;}
.card{background:var(--white);border-radius:var(--radius);padding:28px 32px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:20px;}
.page-title{font-size:1.6rem;font-weight:900;color:var(--ink);margin-bottom:4px;}
.page-sub{font-size:.88rem;color:var(--muted);}
.btn{padding:10px 20px;border:none;border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent);}
.btn-outline:hover{background:var(--accent-soft);}
.btn-danger{background:transparent;color:var(--danger);border:1.5px solid var(--danger);font-size:.78rem;padding:6px 14px;}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
.toolbar-right{margin-right:auto;}
.count-badge{font-size:.8rem;color:var(--muted);background:var(--bg);padding:6px 14px;border-radius:99px;border:1px solid var(--border);}
/* table */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.85rem;}
thead th{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--ink);padding:10px 12px;text-align:right;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--accent-soft);}
td{padding:11px 12px;vertical-align:middle;}
.tag{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.72rem;font-weight:700;}
.tag-p{background:#dbeafe;color:#1e3a8a;}
.tag-a{background:#fef3c7;color:#92400e;}
.tag-e{background:#d1fae5;color:#065f46;}
.tag-i{background:#fce7f3;color:#9d174d;}
.tag-disc{background:#f0f4ff;color:var(--accent-dark);}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:12px;}
/* login */
.login-wrap{max-width:400px;margin:80px auto 0;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.82rem;font-weight:600;color:var(--ink);margin-bottom:6px;}
.field input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:1rem;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.15);}
.hero-wrap{text-align:center;padding:32px 0 20px;}
.hero-logo{font-size:3rem;font-weight:900;color:#0a0f1e;letter-spacing:-.02em;text-shadow:0 2px 12px rgba(0,0,0,0.18);}
.hero-logo span{color:var(--accent);}
.error-msg{background:#fff1f2;border:1px solid #fecaca;border-radius:var(--radius-sm);padding:10px 14px;font-size:.85rem;color:#991b1b;margin-top:12px;display:none;}
@media print{.toolbar,.btn{display:none!important;}}
</style>
</head>
<body>
<div class="wrap">

<!-- מסך התחברות -->
<div id="screen-login">
  <div class="login-wrap">
    <div class="hero-wrap"><div class="hero-logo"><span>א</span>זימוט</div></div>
    <div class="card">
      <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:4px;">סיכום קורס</h2>
      <p style="font-size:.85rem;color:var(--muted);margin-bottom:20px;">כניסה למפקדים בלבד</p>
      <div class="field"><label>שם משתמש</label><input type="text" id="login-user" autocomplete="username"></div>
      <div class="field"><label>סיסמה</label><input type="password" id="login-pass" autocomplete="current-password"></div>
      <button class="btn btn-primary" style="width:100%;padding:14px;" onclick="doLogin()">כניסה</button>
      <div class="error-msg" id="login-error">שם משתמש או סיסמה שגויים.</div>
    </div>
  </div>
</div>

<!-- מסך ראשי -->
<div id="screen-main" style="display:none;">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
      <div>
        <div class="page-title">סיכום קורס - אזימוט</div>
        <div class="page-sub" id="summary-sub">טוען נתונים...</div>
      </div>
      <button class="btn btn-outline" onclick="doLogout()">יציאה</button>
    </div>
  </div>

  <div class="card">
    <div class="toolbar">
      <button class="btn btn-primary" onclick="exportCSV()">יצא CSV</button>
      <button class="btn btn-outline" onclick="window.print()">הדפס</button>
      <span class="count-badge" id="count-badge">0 חניכים</span>
      <div class="toolbar-right">
        <button class="btn btn-danger" onclick="clearAll()">נקה הכל</button>
      </div>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>מ"א</th>
            <th>שם</th>
            <th>תאריך</th>
            <th>שעה</th>
            <th>סגנון ראשי</th>
            <th>סגנון משני</th>
            <th>DISC</th>
            <th>P</th><th>A</th><th>E</th><th>I</th>
          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none;">
        <div class="empty-icon">📋</div>
        <div>אין חניכים שמילאו עדיין את השאלון במחשב זה.</div>
      </div>
    </div>
  </div>
</div>

</div>
<script>
const CREDENTIALS = { admin: 'Admin123' };
const SUMMARY_KEY = 'azimuth_summary';

const tagClass = {P:'tag-p',A:'tag-a',E:'tag-e',I:'tag-i'};

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (CREDENTIALS[u] && CREDENTIALS[u] === p) {
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-main').style.display = 'block';
    loadSummary();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
  document.getElementById('screen-main').style.display = 'none';
  document.getElementById('screen-login').style.display = 'block';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

function loadSummary() {
  let data = [];
  try { data = JSON.parse(localStorage.getItem(SUMMARY_KEY) || '[]'); } catch(e) {}
  // sort by date+time descending
  data.sort((a,b) => (b.date+b.time).localeCompare(a.date+a.time));

  const badge = document.getElementById('count-badge');
  badge.textContent = data.length + ' חניכים';
  document.getElementById('summary-sub').textContent =
    data.length === 0 ? 'אין נתונים עדיין' : `עדכון אחרון: ${data[0].date} ${data[0].time}`;

  const tbody = document.getElementById('tbl-body');
  const empty = document.getElementById('empty-state');

  if (data.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = data.map(r => `
    <tr>
      <td><b>${r.pid}</b></td>
      <td>${r.name}</td>
      <td>${r.date}</td>
      <td>${r.time || '-'}</td>
      <td><span class="tag ${tagClass[styleKey(r.paei_primary)]}">${r.paei_primary}</span></td>
      <td><span class="tag ${tagClass[styleKey(r.paei_secondary)]}">${r.paei_secondary}</span></td>
      <td><span class="tag tag-disc">${r.disc}</span></td>
      <td>${r.scores?.P ?? '-'}</td>
      <td>${r.scores?.A ?? '-'}</td>
      <td>${r.scores?.E ?? '-'}</td>
      <td>${r.scores?.I ?? '-'}</td>
    </tr>`).join('');
}

function styleKey(label) {
  const map = {'תפוקתי':'P','מינהלן':'A','יזם':'E','מתכלל':'I'};
  return map[label] || 'P';
}

function exportCSV() {
  let data = [];
  try { data = JSON.parse(localStorage.getItem(SUMMARY_KEY) || '[]'); } catch(e) {}
  if (data.length === 0) { alert('אין נתונים לייצוא.'); return; }

  const bom = '\uFEFF';
  const header = ['מספר אישי','שם','תאריך','שעה','סגנון ראשי PAEI','סגנון משני PAEI','DISC','P','A','E','I'];
  const rows = data.map(r => [
    r.pid, r.name, r.date, r.time||'',
    r.paei_primary, r.paei_secondary, r.disc,
    r.scores?.P??'', r.scores?.A??'', r.scores?.E??'', r.scores?.I??''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));

  const csv = bom + [header.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'azimuth_course_' + new Date().toLocaleDateString('he-IL').replace(/\//g,'-') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function clearAll() {
  if (!confirm('למחוק את כל נתוני החניכים מהמחשב הזה?')) return;
  localStorage.removeItem(SUMMARY_KEY);
  loadSummary();
}
</script>
</body>
</html>
